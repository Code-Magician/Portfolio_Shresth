# To skip this workflow, include either "[skip ci]" or "[ci skip]"
# anywhere in your commit message.
#
# Example:
# git commit -m "docs: update README [skip ci]"

name: Build & Deploy WebGL

on:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  deployments: write
  statuses: write

#########################################################################
# Prevent multiple builds of the same branch.
#########################################################################

concurrency:
  group: webgl-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

    #######################################################################
    # Checkout
    #######################################################################

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.sha }}
        lfs: true
        fetch-depth: 0

    - name: Pull Git LFS Files
      run: |
        git lfs install
        git lfs pull

    #######################################################################
    # Read Commit Message
    #######################################################################

    - name: Read Commit Message
      shell: bash
      run: |
        BRANCH_NAME="${{ github.ref_name }}"
        COMMIT_SHA="${{ github.sha }}"
        COMMIT_MESSAGE="$(git log -1 --pretty=%B "$COMMIT_SHA")"

        echo "Branch: $BRANCH_NAME"
        echo "Commit: $COMMIT_SHA"
        echo "Commit Message:"
        echo "$COMMIT_MESSAGE"

        echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
        echo "COMMIT_SHA=$COMMIT_SHA" >> $GITHUB_ENV

        {
          echo "COMMIT_MESSAGE<<EOF_COMMIT_MESSAGE"
          echo "$COMMIT_MESSAGE"
          echo "EOF_COMMIT_MESSAGE"
        } >> $GITHUB_ENV

    #######################################################################
    # Should Build?
    #######################################################################

    - name: Detect Build Commit
      shell: bash
      run: |
        BUILD=false

        if [[ "$COMMIT_MESSAGE" == *"[skip ci]"* || "$COMMIT_MESSAGE" == *"[ci skip]"* ]]; then

          echo "Skip CI detected. Build will not run."
          BUILD=false

        elif [[ "$BRANCH_NAME" == "main" ]]; then

          # Always build production when changes are merged/pushed to main
          BUILD=true

        elif [[ "$BRANCH_NAME" == "develop" && "$COMMIT_MESSAGE" =~ ^chore\(webgl\): ]]; then

          # Only build development after version.yml creates the version bump commit
          BUILD=true

        else

          # Any normal develop commit should not build directly.
          # version.yml will decide whether to bump .version.
          BUILD=false

        fi

        echo "BUILD=$BUILD" >> $GITHUB_ENV
        echo "BUILD = $BUILD"

    #######################################################################
    # Read Version
    #######################################################################

    - name: Read Version
      if: env.BUILD == 'true'
      shell: bash
      run: |
        VERSION=$(cat "${{ vars.VERSION_FILE }}")

        echo "VERSION=$VERSION" >> $GITHUB_ENV

        echo "Current Version = $VERSION"

    #######################################################################
    # Create Build Version
    #######################################################################

    - name: Create Build Version
      if: env.BUILD == 'true'
      shell: bash
      run: |
        if [[ "$BRANCH_NAME" == "develop" ]]; then

          BUILD_VERSION="${VERSION}-dev.${{ github.run_number }}"

        else

          BUILD_VERSION="${VERSION}"

        fi

        echo "BUILD_VERSION=$BUILD_VERSION" >> $GITHUB_ENV

        echo "Build Version = $BUILD_VERSION"

    #######################################################################
    # Cache
    #######################################################################

    - name: Cache Unity Library
      if: env.BUILD == 'true'
      uses: actions/cache@v4
      with:
        path: Library
        key: Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-${{ hashFiles('Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
        restore-keys: |
          Library-${{ vars.BUILD_TARGET }}-${{ runner.os }}-

    #######################################################################
    # Build Timer
    #######################################################################

    - name: Record Build Start
      if: env.BUILD == 'true'
      run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

    #######################################################################
    # Generate Build Metadata
    #######################################################################

    - name: Generate Build Metadata
      if: env.BUILD == 'true'
      shell: bash
      run: |
        mkdir -p Assets/StreamingAssets

        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        cat > Assets/StreamingAssets/buildinfo.json <<EOF
        {
          "version": "$BUILD_VERSION",
          "buildNumber": "${{ github.run_number }}",
          "commit": "$COMMIT_SHA",
          "branch": "$BRANCH_NAME",
          "buildDate": "$BUILD_DATE",
          "unityVersion": "${{ vars.UNITY_VERSION }}",
          "workflow": "GitHub Actions",
          "buildConfiguration": "Release",
          "targetPlatform": "${{ vars.BUILD_TARGET }}",
          "buildMachine": "GitHub Runner"
        }
        EOF

        echo ""
        echo "========== BUILD INFO =========="
        cat Assets/StreamingAssets/buildinfo.json
        echo "================================"

    #######################################################################
    # Unity Build
    #######################################################################

    - name: Build Unity Project
      if: env.BUILD == 'true'
      uses: game-ci/unity-builder@v4
      env:
        UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
        UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      with:
        targetPlatform: ${{ vars.BUILD_TARGET }}
        buildMethod: BuildScript.BuildWebGL

    #######################################################################
    # Upload Artifact Production Only
    #######################################################################

    - name: Upload WebGL Build
      if: env.BUILD == 'true' && env.BRANCH_NAME == 'main'
      uses: actions/upload-artifact@v4
      with:
        name: Portfolio-WebGL-${{ env.BUILD_VERSION }}
        path: ${{ vars.BUILD_OUTPUT }}
        retention-days: 2

    #######################################################################
    # Deploy Production
    #######################################################################

    - name: Deploy Production
      if: env.BUILD == 'true' && env.BRANCH_NAME == 'main'
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: ${{ vars.BUILD_OUTPUT }}
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: |
          🚀 Production Build ${{ env.BUILD_VERSION }}
          Branch: ${{ env.BRANCH_NAME }}

      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

    #######################################################################
    # Deploy Development
    #######################################################################

    - name: Deploy Development
      if: env.BUILD == 'true' && env.BRANCH_NAME == 'develop'
      uses: nwtgck/actions-netlify@v3
      with:
        publish-dir: ${{ vars.BUILD_OUTPUT }}
        production-branch: develop
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: |
          🧪 Development Build ${{ env.BUILD_VERSION }}
          Branch: ${{ env.BRANCH_NAME }}

      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_DEV_SITE_ID }}

    #######################################################################
    # Build Summary
    #######################################################################

    - name: Print Build Summary
      if: env.BUILD == 'true'
      run: |
        BUILD_END=$(date +%s)

        echo ""
        echo "=================================================="
        echo "Branch          : $BRANCH_NAME"
        echo "Version         : $BUILD_VERSION"
        echo "Run Number      : ${{ github.run_number }}"
        echo "Unity Version   : ${{ vars.UNITY_VERSION }}"
        echo "Build Target    : ${{ vars.BUILD_TARGET }}"
        echo "Duration        : $((BUILD_END - BUILD_START)) seconds"
        echo "=================================================="

    #######################################################################
    # Skipped Build Summary
    #######################################################################

    - name: Print Skipped Build Summary
      if: env.BUILD != 'true'
      run: |
        echo ""
        echo "=================================================="
        echo "Build skipped."
        echo "Branch          : $BRANCH_NAME"
        echo "Commit Message  : $COMMIT_MESSAGE"
        echo "Reason          : Not main and not chore(webgl) version commit."
        echo "=================================================="